<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Triathlon Training</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7fff7f;
    --text: #e8edf5;
    --muted: #6b7a99;
    --border: rgba(255,255,255,0.07);
    --swim: #00d4ff;
    --bike: #ff6b35;
    --run: #7fff7f;
    --strength: #c084fc;
    --rest: #6b7a99;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(180deg, #0d1525 0%, transparent 100%);
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .app-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .date-badge {
    text-align: right;
  }

  .date-badge .day-name {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .date-badge .date-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 1;
    color: var(--accent);
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 0 0 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* Hero Today Card */
  .today-section {
    padding: 16px 20px;
  }

  .today-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .today-card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease;
  }

  .today-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .today-card.rest-day::before {
    background: var(--muted);
  }

  .today-day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .week-info {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .session-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .session-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .session-item.done {
    opacity: 0.45;
  }

  .session-item.done .session-title {
    text-decoration: line-through;
  }

  .session-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .session-content { flex: 1; min-width: 0; }

  .session-title {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 2px;
  }

  .session-detail {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .check-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 2px;
  }

  .session-item.done .check-btn {
    background: var(--accent3);
    border-color: var(--accent3);
  }

  .check-icon { font-size: 13px; }

  /* Nutrition Card */
  .nutrition-card {
    margin: 0 20px 16px;
    background: var(--card);
    border-radius: 20px;
    padding: 18px 20px;
    border: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }

  .nutrition-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff9500, #ff6b35);
  }

  .nutrition-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin: 0 20px 8px;
  }

  .nut-item {}

  .nut-name {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .nut-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 1;
  }

  .nut-value.carbs { color: #ff9500; }
  .nut-value.protein { color: #00d4ff; }

  .nut-unit {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 2px;
  }

  .nut-type {
    font-size: 11px;
    margin-top: 4px;
    padding: 2px 8px;
    border-radius: 10px;
    display: inline-block;
  }

  .nut-type.intensive { background: rgba(255,107,53,0.15); color: var(--accent2); }
  .nut-type.base { background: rgba(0,212,255,0.1); color: var(--accent); }

  /* Week view */
  .week-section {
    padding: 0 20px;
    margin-bottom: 20px;
  }

  .week-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .week-day {
    background: var(--card);
    border-radius: 12px;
    padding: 10px 4px;
    text-align: center;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .week-day.today {
    border-color: var(--accent);
    background: rgba(0,212,255,0.08);
  }

  .week-day.selected {
    border-color: var(--accent2);
    background: rgba(255,107,53,0.08);
  }

  .week-day-name {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .week-day-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .week-day.today .week-day-num { color: var(--accent); }

  .week-dots {
    display: flex;
    gap: 2px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  /* Phase indicator */
  .phase-bar {
    margin: 0 20px 16px;
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .phase-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    box-shadow: 0 0 8px var(--accent);
  }

  .phase-text { font-size: 13px; }
  .phase-name { font-weight: 600; }
  .phase-sub { font-size: 11px; color: var(--muted); }

  .phase-weeks {
    margin-left: auto;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent);
  }

  /* Rest day */
  .rest-card-inner {
    text-align: center;
    padding: 20px 0;
  }

  .rest-emoji { font-size: 48px; margin-bottom: 10px; }
  .rest-text { color: var(--muted); font-size: 14px; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .selected-day-section {
    padding: 0 20px 20px;
    animation: fadeUp 0.3s ease;
  }

  .selected-day-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--accent2);
    margin-bottom: 10px;
  }

  .bottom-safe { height: 40px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title">TRIATHLON</div>
      <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px">Training Plan</div>
    </div>
    <div class="date-badge">
      <div class="day-name" id="headerDayName"></div>
      <div class="date-num" id="headerDateNum"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('today')">Heute</button>
    <button class="tab" onclick="setTab('week')">Diese Woche</button>
    <button class="tab" onclick="setTab('all')">Alle Wochen</button>
  </div>
</div>

<div id="view-today">
  <!-- Phase bar -->
  <div class="phase-bar" id="phaseBar">
    <div class="phase-dot"></div>
    <div class="phase-text">
      <div class="phase-name" id="phaseName"></div>
      <div class="phase-sub" id="phaseSub"></div>
    </div>
    <div class="phase-weeks" id="phaseWeeks"></div>
  </div>

  <!-- Today -->
  <div class="today-section">
    <div class="today-label">Heute</div>
    <div class="today-card" id="todayCard">
      <div class="today-day-title" id="todayDayTitle"></div>
      <div class="week-info" id="todayWeekInfo"></div>
      <div class="session-list" id="todaySessionList"></div>
    </div>
  </div>

  <!-- Nutrition -->
  <div class="nutrition-label">Ernährungsziele</div>
  <div class="nutrition-card" id="nutritionCard">
    <div class="nut-item">
      <div class="nut-name">Kohlenhydrate</div>
      <div class="nut-value carbs" id="nutCarbs">—</div>
      <div class="nut-type" id="nutType">—</div>
    </div>
    <div class="nut-item">
      <div class="nut-name">Protein</div>
      <div class="nut-value protein" id="nutProtein">—</div>
    </div>
  </div>
</div>

<!-- Week View -->
<div id="view-week" style="display:none; padding:16px 20px 20px;">
  <div class="week-title">Diese Woche</div>
  <div class="week-grid" id="weekGrid"></div>
  <div class="selected-day-section" id="selectedDaySection" style="display:none; padding: 20px 0 0;">
    <div class="selected-day-label" id="selectedDayLabel"></div>
    <div class="today-card" id="selectedDayCard">
      <div class="today-day-title" id="selectedDayTitle"></div>
      <div class="session-list" id="selectedDayList"></div>
    </div>
    <div style="margin-top:12px;">
      <div class="nutrition-label" style="margin:0 0 8px;">Ernährungsziele</div>
      <div class="nutrition-card" id="selectedNutCard" style="margin:0;">
        <div class="nut-item">
          <div class="nut-name">Kohlenhydrate</div>
          <div class="nut-value carbs" id="selNutCarbs">—</div>
          <div class="nut-type" id="selNutType">—</div>
        </div>
        <div class="nut-item">
          <div class="nut-name">Protein</div>
          <div class="nut-value protein" id="selNutProtein">—</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- All Weeks View -->
<div id="view-all" style="display:none; padding:16px 20px 20px;">
  <div id="allWeeksContent"></div>
</div>

<div class="bottom-safe"></div>

  ...Array.from({length:4}, (_,wi) => [
    { week:15+wi, day:0, sessions:[{type:'strength',title:'Kraft Oberkörper',detail:''}]},
    { week:15+wi, day:1, sessions:[{type:'bike',title:'Rad',detail:'100–110 min • Wettkampftempo'}]},
    { week:15+wi, day:2, sessions:[{type:'swim',title:'Schwimmen',detail:'2.400–2.600 m'}]},
    { week:15+wi, day:3, sessions:[
      {type:'strength',title:'Kraft',detail:''},
      {type:'run',title:'Lauf',detail:'75–80 min'}
    ]},
    { week:15+wi, day:4, sessions:[{type:'swim',title:'Schwimmen',detail:'2.400–2.600 m'}]},
    { week:15+wi, day:5, sessions:[
      {type:'bike',title:'Rad',detail:'3,5–4 h'},
      {type:'run',title:'Koppellauf',detail:'40 min Wettkampftempo'}
    ]},
    { week:15+wi, day:6, sessions:[{type:'run',title:'Lauf',detail:'105–115 min'}]},
  ]).flat(),

  // WOCHE 19 (Taper -30%)
  { week:19, day:0, sessions:[{type:'strength',title:'Kraft Oberkörper',detail:'leicht'}]},
  { week:19, day:1, sessions:[{type:'bike',title:'Rad',detail:'~70 min (Volumen -30%)'}]},
  { week:19, day:2, sessions:[{type:'swim',title:'Schwimmen',detail:'~1.600 m (Volumen -30%)'}]},
  { week:19, day:3, sessions:[
    {type:'strength',title:'Kraft',detail:'leicht'},
    {type:'run',title:'Lauf',detail:'~55 min (Volumen -30%)'}
  ]},
  { week:19, day:4, sessions:[{type:'swim',title:'Schwimmen',detail:'~1.700 m (Volumen -30%)'}]},
  { week:19, day:5, sessions:[{type:'bike',title:'Rad',detail:'~2 h (Volumen -30%)'}]},
  { week:19, day:6, sessions:[{type:'run',title:'Lauf',detail:'~75 min (Volumen -30%)'}]},

  // WOCHE 20 (Race Week)
  { week:20, day:0, sessions:[{type:'strength',title:'Kraft',detail:'leicht'}]},
  { week:20, day:1, sessions:[{type:'bike',title:'Rad',detail:'60 min • 3×5 min Race Pace'}]},
  { week:20, day:2, sessions:[{type:'swim',title:'Schwimmen',detail:'1.500 m locker'}]},
  { week:20, day:3, sessions:[{type:'run',title:'Lauf',detail:'40 min locker'}]},
  { week:20, day:4, sessions:[{type:'swim',title:'Schwimmen',detail:'800 m • 3 Steigerungen'}]},
  { week:20, day:5, sessions:[{type:'run',title:'Lockeres Bewegen',detail:'20 min'}]},
  { week:20, day:6, sessions:[{type:'run',title:'🏁 RACE DAY',detail:'Viel Erfolg!'}]},
];

function getPhase(week) {
  if (week <= 4) return {name:'Phase 1 – Grundlage', sub:'Technik & Basis aufbauen', color:'var(--accent)'};
  if (week <= 8) return {name:'Phase 2 – Aufbau', sub:'Radleistung & erste Koppelläufe', color:'#7fff7f'};
  if (week <= 14) return {name:'Phase 3 – Spezifisch', sub:'Lange Belastungen & Koppelläufe', color:'var(--accent2)'};
  if (week <= 18) return {name:'Phase 4 – Peak', sub:'Wettkampftempo & Höchstbelastung', color:'#ff3b6b'};
  if (week === 19) return {name:'Phase 5 – Taper', sub:'Volumen -30%, Erholung', color:'var(--accent)'};
  return {name:'Race Week 🏁', sub:'Letzte Vorbereitungen', color:'#ffd700'};
}

function isIntensiveDay(sessions) {
  return sessions.some(s => s.type === 'bike' || s.type === 'run' || s.detail?.includes('Tempo') || s.detail?.includes('Intervall') || s.detail?.includes('Sweet Spot'));
}

function getNutrition(sessions) {
  const intensive = isIntensiveDay(sessions);
  if (intensive) {
    return {carbs:'420–500', protein:'130–145', type:'Intensiv', typeClass:'intensive'};
  }
  return {carbs:'300–350', protein:'120–130', type:'Grundlage', typeClass:'base'};
}

function getPlanDay(date) {
  const diff = Math.floor((date - PLAN_START) / 86400000);
  if (diff < 0) return null;
  const weekIdx = Math.floor(diff / 7);
  const dayIdx = diff % 7;
  const weekNum = weekIdx + 1;
  if (weekNum > 20) return null;
  return plan.find(d => d.week === weekNum && d.day === dayIdx) || null;
}

function getCurrentWeekDays(date) {
  const diff = Math.floor((date - PLAN_START) / 86400000);
  const weekStart = diff - (diff % 7);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(PLAN_START.getTime() + (weekStart + i) * 86400000);
    return { date: d, planDay: plan.find(p => p.week === Math.floor(weekStart/7)+1 && p.day === i) || null };
  });
}

// State
let doneSet = JSON.parse(localStorage.getItem('triDone') || '{}');
let currentTab = 'today';
let selectedWeekDayIdx = null;

function toggleDone(key) {
  doneSet[key] = !doneSet[key];
  localStorage.setItem('triDone', JSON.stringify(doneSet));
  render();
}

function renderSessionList(sessions, dateKey, container) {
  container.innerHTML = '';
  if (!sessions || sessions.length === 0) {
    container.innerHTML = '<div class="rest-card-inner"><div class="rest-emoji">😴</div><div class="rest-text">Ruhetag – Erhol dich gut!</div></div>';
    return;
  }
  sessions.forEach((s, idx) => {
    const key = `${dateKey}-${idx}`;
    const done = !!doneSet[key];
    const info = sessionIcon(s.type);
    const item = document.createElement('div');
    item.className = 'session-item' + (done ? ' done' : '');
    item.innerHTML = `
      <div class="session-icon" style="background:${info.bg};">${info.icon}</div>
      <div class="session-content">
        <div class="session-title" style="color:${info.color}">${s.title}</div>
        <div class="session-detail">${s.detail.replace(/\n/g,'<br>')}</div>
      </div>
      <button class="check-btn" onclick="toggleDone('${key}')">
        <span class="check-icon">${done ? '✓' : ''}</span>
      </button>
    `;
    container.appendChild(item);
  });
}

function renderNutrition(sessions, carbsEl, proteinEl, typeEl) {
  const nut = getNutrition(sessions || []);
  carbsEl.innerHTML = nut.carbs + '<span class="nut-unit">g</span>';
  proteinEl.innerHTML = nut.protein + '<span class="nut-unit">g</span>';
  typeEl.textContent = nut.type;
  typeEl.className = 'nut-type ' + nut.typeClass;
}

function render() {
  const today = new Date();
  today.setHours(0,0,0,0);

  // Header date
  document.getElementById('headerDayName').textContent = DAYS_FULL[today.getDay()];
  document.getElementById('headerDateNum').textContent = today.getDate() + ' ' + MONTHS[today.getMonth()];

  const planDay = getPlanDay(today);
  const sessions = planDay ? planDay.sessions : [];
  const weekNum = planDay ? planDay.week : null;
  const dateKey = today.toISOString().split('T')[0];

  // Phase
  if (weekNum) {
    const phase = getPhase(weekNum);
    document.getElementById('phaseName').textContent = phase.name;
    document.getElementById('phaseSub').textContent = phase.sub;
    document.getElementById('phaseWeeks').textContent = 'W' + weekNum;
    document.getElementById('phaseBar').style.display = '';
    document.querySelector('.phase-dot').style.background = phase.color;
    document.querySelector('.phase-dot').style.boxShadow = `0 0 8px ${phase.color}`;
  } else {
    document.getElementById('phaseBar').style.display = 'none';
  }

  // Today card
  document.getElementById('todayDayTitle').textContent = DAYS_FULL[today.getDay()].toUpperCase();
  document.getElementById('todayWeekInfo').textContent = weekNum ? `Woche ${weekNum} von 20` : 'Vor dem Planstart / nach Raceday';
  renderSessionList(sessions, dateKey, document.getElementById('todaySessionList'));
  renderNutrition(sessions, document.getElementById('nutCarbs'), document.getElementById('nutProtein'), document.getElementById('nutType'));

  // Week view
  if (currentTab === 'week') renderWeekView(today);
  if (currentTab === 'all') renderAllWeeks();
}

function renderWeekView(today) {
  const weekDays = getCurrentWeekDays(today);
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';

  weekDays.forEach((wd, i) => {
    const isToday = wd.date.toDateString() === today.toDateString();
    const isSelected = selectedWeekDayIdx === i;
    const sessions = wd.planDay ? wd.planDay.sessions : [];

    const div = document.createElement('div');
    div.className = 'week-day' + (isToday ? ' today' : '') + (isSelected ? ' selected' : '');
    div.innerHTML = `
      <div class="week-day-name">${DAYS[wd.date.getDay()]}</div>
      <div class="week-day-num">${wd.date.getDate()}</div>
      <div class="week-dots">
        ${sessions.map(s => {
          const info = sessionIcon(s.type);
          return `<div class="dot" style="background:${info.color}"></div>`;
        }).join('')}
      </div>
    `;
    div.onclick = () => {
      selectedWeekDayIdx = (selectedWeekDayIdx === i) ? null : i;
      renderWeekView(today);
    };
    grid.appendChild(div);
  });

  const sec = document.getElementById('selectedDaySection');
  if (selectedWeekDayIdx !== null) {
    const wd = weekDays[selectedWeekDayIdx];
    const sessions = wd.planDay ? wd.planDay.sessions : [];
    const dateKey = wd.date.toISOString().split('T')[0];
    document.getElementById('selectedDayLabel').textContent = DAYS_FULL[wd.date.getDay()] + ', ' + wd.date.getDate() + '. ' + MONTHS[wd.date.getMonth()];
    document.getElementById('selectedDayTitle').textContent = DAYS_FULL[wd.date.getDay()].toUpperCase();
    renderSessionList(sessions, dateKey, document.getElementById('selectedDayList'));
    renderNutrition(sessions, document.getElementById('selNutCarbs'), document.getElementById('selNutProtein'), document.getElementById('selNutType'));
    sec.style.display = '';
  } else {
    sec.style.display = 'none';
  }
}

function renderAllWeeks() {
  const container = document.getElementById('allWeeksContent');
  const phases = [
    {label:'Phase 1 – Grundlage', weeks:[1,2,3,4]},
    {label:'Phase 2 – Aufbau', weeks:[5,6,7,8]},
    {label:'Phase 3 – Spezifisch', weeks:[9,10,11,12,13,14]},
    {label:'Phase 4 – Peak', weeks:[15,16,17,18]},
    {label:'Phase 5 – Taper & Race', weeks:[19,20]},
  ];

  container.innerHTML = phases.map(ph => `
    <div style="margin-bottom:24px;">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px;">${ph.label}</div>
      ${ph.weeks.map(w => {
        const weekDays = Array.from({length:7}, (_,i) => plan.find(d=>d.week===w&&d.day===i)||{sessions:[]});
        const allSessions = weekDays.flatMap(d=>d.sessions);
        const types = [...new Set(allSessions.map(s=>s.type))];
        return `<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--muted);width:40px;flex-shrink:0;">W${w}</div>
          <div style="flex:1">
            <div style="display:flex;gap:4px;flex-wrap:wrap;">
              ${types.map(t=>{const i=sessionIcon(t);return `<span style="font-size:16px;">${i.icon}</span>`;}).join('')}
            </div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px;">${allSessions.length} Einheiten</div>
          </div>
          <div style="font-size:11px;color:var(--muted);text-align:right;">${getPhase(w).sub.split('&')[0]}</div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['today','week','all'][i] === tab);
  });
  document.getElementById('view-today').style.display = tab==='today' ? '' : 'none';
  document.getElementById('view-week').style.display = tab==='week' ? '' : 'none';
  document.getElementById('view-all').style.display = tab==='all' ? '' : 'none';

  const today = new Date(); today.setHours(0,0,0,0);
  if (tab==='week') renderWeekView(today);
  if (tab==='all') renderAllWeeks();
}

render();
</script>
</body>
</html>
